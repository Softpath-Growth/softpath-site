# Site settings
title: Softpath
tagline: "Marketing Infrastructure & Paid Acquisition Consulting"
email: noah@softpath.co
description: >-
  Softpath is a fractional growth consultancy that fixes marketing infrastructure and runs paid acquisition you can actually measure. Marketing measurement audits, tracking implementation, attribution, and analytics for B2C and B2B2C companies.
baseurl: ""
url: "https://softpath.co"

# Author (used by jekyll-seo-tag)
author:
  name: Noah Manion
  email: noah@softpath.co
  uri: "https://softpath.co/about/"

# Social / jekyll-seo-tag config
twitter:
  username: noahmanion
  card: summary

social:
  name: Noah Manion
  links:
    - https://www.linkedin.com/in/noahmanion
    - https://github.com/noahmanion

# Default OG image for jekyll-seo-tag
logo: /assets/images/softpath-logo.png
og_image: /assets/images/softpath-small.jpg

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "page"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Noah Manion"
      image: /assets/images/softpath-small.jpg

sass:
  sass_dir: assets/_sass

github_username: noahmanion

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /blog/:slug/
future: true

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - README.md
  - firebase.json
  - .firebaserc
  - .claude/
  - .DS_Store
  - SEO-GEO-PROJECT.md
  - GEO-MONITORING.md
  - generate-llms-full.sh
  - softpath_website_content.md
  - softpath_website_content_styled.md
  - claude_code_style_prompt.md
  - assets/SoftpathStyleGuide.pdf
