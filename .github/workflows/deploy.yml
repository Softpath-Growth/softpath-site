name: Build and Deploy

on:
  push:
    branches: [main]
  schedule:
    # Runs daily at 8am UTC (3am EST / midnight PST)
    - cron: "0 8 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # action-hosting-deploy has no Node 24 release yet (latest v0.10.0 still
      # targets node20). Force its JS runtime to Node 24 ahead of GitHub's
      # 2026-06-16 forced cutover. Remove once the action ships a node24 release.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Build Jekyll site
        run: JEKYLL_ENV=production bundle exec jekyll build

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: clearpath-website-8a54b
