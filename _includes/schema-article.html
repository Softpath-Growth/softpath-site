<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": {{ page.title | jsonify }},
  "description": {{ page.description | default: page.excerpt | strip_html | truncate: 160 | jsonify }},
  "author": {
    "@type": "Person",
    "name": "Noah Manion",
    "url": "https://softpath.co/about/",
    "sameAs": [
      "https://www.linkedin.com/in/noahmanion"
    ]
  },
  "publisher": {
    "@type": "Organization",
    "name": "Softpath",
    "url": "https://softpath.co",
    "logo": {
      "@type": "ImageObject",
      "url": "https://softpath.co/assets/images/softpath-logo.png"
    }
  },
  "datePublished": "{{ page.date | date_to_xmlschema }}",
  "dateModified": "{{ page.last_modified_at | default: page.date | date_to_xmlschema }}",
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ page.url | absolute_url }}"
  },
  "url": "{{ page.url | absolute_url }}"
}
</script>
